id: no-credential-in-agent-context
name: No Credentials in Agent Context
description: >
  Never pass credentials, tokens, or secrets in agent prompts, system messages,
  or context. Credentials in context can be leaked via prompt injection,
  logged in conversation history, or exfiltrated through tool calls.
severity: error
category: security
tags: [security, owasp-agentic, credentials, prompt-injection]
globs:
  - "**/*.ts"
  - "**/*.js"
  - "**/*.py"
alwaysApply: false
scope:
  include: ["**/*.ts", "**/*.js", "**/*.py"]
  exclude: ["**/*.test.*", "**/*.spec.*", "**/node_modules/**"]
checker:
  type: pattern
  pattern: "(?:system_prompt|systemPrompt|context|messages).*(?:api_key|apiKey|secret|token|password|credential|bearer)\\s*[:=]|(?:api_key|apiKey|secret|token|password|credential).*(?:system_prompt|systemPrompt|context|messages)"
  mode: must-not-exist
docs:
  rationale: >
    OWASP Agentic Top 10 - Credential Leakage. Agent prompts and context
    windows are not secure storage. Credentials placed in context can be
    extracted by prompt injection attacks, appear in logs, or be sent to
    external services via tool calls. Use secure credential managers instead.
  fix: >
    Remove credentials from agent context. Use environment variables or a
    secrets manager, and access them only at the tool execution layer, never
    in the prompt or system message.
  references:
    - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  examples:
    incorrect: |
      const systemPrompt = `Use API key: ${process.env.API_KEY}`
      agent.context = { token: "sk-secret123" }
    correct: |
      // Credentials accessed at tool layer, not in prompt
      function callApi() { return fetch(url, { headers: { Authorization: `Bearer ${process.env.API_KEY}` } }) }
