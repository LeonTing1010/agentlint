id: no-db-in-apps
name: No Direct Database Access in Apps
description: >
  Application/presentation layer must not import database clients directly.
  Use domain or service layer instead. Direct DB access in apps bypasses
  domain validation, enabling inconsistent writes and data corruption.
severity: error
category: layering
tags: [architecture, separation-of-concerns, layering]
globs:
  - "apps/**"
alwaysApply: false
scope:
  include: ["apps/**"]
  exclude: ["**/*.test.*", "**/*.spec.*"]
checker:
  type: pattern
  pattern: "import.*(?:prisma|mongoose|sequelize|knex|typeorm|drizzle).*from"
  mode: must-not-exist
docs:
  rationale: >
    Direct database access from the application layer violates separation of
    concerns. All data access should go through domain/service layer which
    enforces business rules, validation, and transactional integrity. When
    apps bypass this layer, business invariants can be silently violated.
  fix: >
    Replace direct database client imports with calls to your domain or
    service layer. For example, replace `import { prisma } from '@org/database'`
    with `import { userService } from '@org/domain'`.
  examples:
    incorrect: |
      import { prisma } from '@org/database'
      import mongoose from 'mongoose'
      import { db } from 'drizzle-orm'
    correct: |
      import { userService } from '@org/domain'
      import { orderService } from '@org/domain'
