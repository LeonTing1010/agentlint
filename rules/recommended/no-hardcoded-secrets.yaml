id: no-hardcoded-secrets
description: >
  No hardcoded API keys, tokens, passwords, or credentials in source code.
  Secrets must be loaded from environment variables or a secrets manager.
severity: error
category: security
tags: [security, secrets, credentials]
scope:
  include:
    - "src/**"
    - "apps/**"
    - "packages/**"
  exclude:
    - "**/*.test.*"
    - "**/*.spec.*"
    - "**/*.example"
    - "**/*.example.*"
    - "**/fixtures/**"
checker:
  type: pattern
  pattern: "(?:sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16}|(?:password|secret|api_key|apiKey|access_token)\\s*[:=]\\s*[\"'][^\"']{8,}[\"'])"
  mode: must-not-exist
docs:
  rationale: >
    Hardcoded secrets in source code are a critical security vulnerability.
    They get committed to version control, shared across environments, and
    are difficult to rotate. Leaked secrets can lead to unauthorized access,
    data breaches, and financial loss.
  fix: >
    Move secrets to environment variables or a secrets manager (e.g., AWS
    Secrets Manager, HashiCorp Vault, .env files excluded from version control).
    Reference them via `process.env.API_KEY` or equivalent.
  examples:
    incorrect: |
      const apiKey = "sk-1234567890abcdefghijklmnopqrstuvwxyz"
      const password = "my-secret-password"
      const config = { secret: "hardcoded-value-here" }
    correct: |
      const apiKey = process.env.API_KEY
      const password = process.env.DB_PASSWORD
      const config = { secret: process.env.APP_SECRET }
